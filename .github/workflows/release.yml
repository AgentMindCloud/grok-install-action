name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Run unit tests
        run: npm test

  release:
    name: Publish GitHub Release
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Extract release notes from CHANGELOG
        id: notes
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.version }}"
          if [ -f CHANGELOG.md ]; then
            awk -v ver="$VERSION" '
              $0 ~ "^## \\[" ver "\\]" { capture=1; next }
              capture && /^## \[/        { exit }
              capture                    { print }
            ' CHANGELOG.md > release-notes.md
          fi
          if [ ! -s release-notes.md ]; then
            echo "Release ${VERSION}." > release-notes.md
          fi
          echo "path=release-notes.md" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          body_path: ${{ steps.notes.outputs.path }}
          draft: false
          prerelease: false
          generate_release_notes: false
          fail_on_unmatched_files: false

  major-tag:
    name: Update floating major-version tag
    needs: release
    runs-on: ubuntu-latest
    if: ${{ !contains(github.ref_name, '-') }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Move major tag to new release
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF#refs/tags/}"
          MAJOR="${TAG%%.*}"
          echo "Moving ${MAJOR} to ${TAG}"
          git config user.name  "grokinstall-bot"
          git config user.email "bot@grokagents.dev"
          git tag -f "${MAJOR}" "${TAG}"
          git push -f origin "${MAJOR}"
