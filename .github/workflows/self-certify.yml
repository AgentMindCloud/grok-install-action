name: self-certify
on:
  push:
    branches: [main]

jobs:
  certify:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Run grok-install-action on its own repo
        uses: ./
        with:
          manifest-path: grok-install.yaml
          capabilities-path: capabilities.yaml
          badge: 'true'
          comment: 'false'
          fail-on: error
