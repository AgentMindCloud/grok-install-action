# Self-test: runs unit tests, then invokes this action against tests/sample-agent
# to prove it wires up end-to-end. Does not commit the badge (update-badge:false)
# because this runs on the action repo itself, not on a consumer repo.
name: test

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm ci --no-audit --no-fund

      - run: npm test

  integration:
    needs: unit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run action against sample agent
        uses: ./
        with:
          working-directory: tests/sample-agent
          mode: warn                     # sample is intentionally minimal — don't fail self-test
          update-badge: false
          comment-on-pr: false
