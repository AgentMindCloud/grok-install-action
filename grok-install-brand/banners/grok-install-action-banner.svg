<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1376 400" width="1376" height="400" role="img" aria-label="grok-install-action">
  <defs>
    <linearGradient id="gi-hero-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00F0FF"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
    <filter id="gi-neon" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .wordmark { font-family: 'Space Grotesk', 'Inter', system-ui, sans-serif; font-weight: 700; letter-spacing: 3.5px; }
      .kicker   { font-family: 'JetBrains Mono', 'Menlo', ui-monospace, monospace; letter-spacing: 2px; }
      .body     { font-family: 'Inter', system-ui, sans-serif; }
    </style>
  </defs>

  <rect width="1376" height="400" fill="#0A0A0A"/>

  <!-- Animated circuit traces: max 4, 5s pulse, 0.42 peak opacity. -->
  <g fill="none" stroke="#00F0FF" stroke-width="1.5" stroke-linecap="round">
    <path d="M0 96 L220 96 L260 136 L560 136 L600 96 L900 96 L940 136 L1376 136" opacity="0.08">
      <animate attributeName="opacity" values="0.08;0.42;0.08" dur="5s" repeatCount="indefinite"/>
    </path>
    <path d="M0 312 L180 312 L220 272 L520 272 L560 312 L860 312 L900 272 L1376 272" opacity="0.08">
      <animate attributeName="opacity" values="0.08;0.42;0.08" dur="5s" begin="1.25s" repeatCount="indefinite"/>
    </path>
    <path d="M0 200 L120 200 L160 240 L440 240 L480 200 L760 200 L800 240 L1376 240" opacity="0.08">
      <animate attributeName="opacity" values="0.08;0.42;0.08" dur="5s" begin="2.5s" repeatCount="indefinite"/>
    </path>
    <path d="M0 200 L80 200 L120 160 L400 160 L440 200 L720 200 L760 160 L1376 160" opacity="0.08">
      <animate attributeName="opacity" values="0.08;0.42;0.08" dur="5s" begin="3.75s" repeatCount="indefinite"/>
    </path>
    <!-- Trace endpoint nodes -->
    <circle cx="260" cy="136" r="3" fill="#00F0FF" opacity="0.4"/>
    <circle cx="600" cy="96" r="3" fill="#00F0FF" opacity="0.4"/>
    <circle cx="940" cy="136" r="3" fill="#00F0FF" opacity="0.4"/>
  </g>

  <!-- Kicker above wordmark -->
  <text x="80" y="165" class="kicker" font-size="14" fill="#00F0FF" opacity="0.7">
    GROK-NATIVE · CI CERTIFICATION
  </text>

  <!-- Wordmark with cyan-to-white gradient + neon glow -->
  <g filter="url(#gi-neon)">
    <text x="80" y="240" class="wordmark" font-size="72" fill="url(#gi-hero-grad)">
      GROKINSTALL-ACTION
    </text>
  </g>

  <!-- Subhead -->
  <text x="80" y="290" class="body" font-size="20" fill="#E5E5E5" opacity="0.85">
    Validate. Certify. Badge. One GitHub Marketplace action for Grok-native agents.
  </text>

  <!-- Shield accent, right-aligned -->
  <g transform="translate(1200 200)">
    <path d="M 0 -60 L 60 -40 L 60 20 Q 60 60 0 80 Q -60 60 -60 20 L -60 -40 Z"
          fill="none" stroke="#00F0FF" stroke-width="2" opacity="0.8"/>
    <path d="M -20 10 L -5 25 L 25 -15"
          fill="none" stroke="#00FF9D" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
