<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675">
  <rect width="1200" height="675" fill="#0A0A0A"/>
  <text x="80" y="110" font-family="Space Grotesk, Inter, sans-serif" font-weight="700" font-size="56" letter-spacing="2" fill="#FFFFFF">Inline fix path. No triage.</text>
  <text x="80" y="150" font-family="Inter, sans-serif" font-size="20" fill="#E5E5E5" opacity="0.75">Red shield, real rule IDs, direct links to the fix guide.</text>

  <!-- glassmorphic card -->
  <g transform="translate(80 190)">
    <rect width="1040" height="440" rx="24" fill="#FFFFFF" fill-opacity="0.06" stroke="#00F0FF" stroke-opacity="0.15" stroke-width="1"/>
    <!-- FAILED shield -->
    <g transform="translate(24 24)">
      <rect width="134" height="20" rx="3" fill="#0A0A0A"/>
      <rect x="82" width="52" height="20" rx="3" fill="#FF2D55"/>
      <text x="41" y="14" font-family="Inter, sans-serif" font-weight="700" font-size="11" text-anchor="middle" fill="#00F0FF">GROK-NATIVE</text>
      <text x="108" y="14" font-family="Inter, sans-serif" font-weight="700" font-size="11" text-anchor="middle" fill="#FFFFFF">FAILED</text>
    </g>
    <text x="24" y="84" font-family="Inter, sans-serif" font-size="22" fill="#FFFFFF"><tspan font-weight="700">Safety score:</tspan> <tspan fill="#FF2D55">85/100</tspan></text>

    <!-- Summary pills -->
    <g transform="translate(24 108)" font-family="JetBrains Mono, monospace" font-size="12" font-weight="700">
      <g><rect width="96" height="22" rx="4" fill="#FF2D55"/><text x="48" y="15" text-anchor="middle" fill="#FFFFFF">errors · 1</text></g>
      <g transform="translate(106 0)"><rect width="110" height="22" rx="4" fill="#00F0FF"/><text x="55" y="15" text-anchor="middle" fill="#0A0A0A">warnings · 0</text></g>
      <g transform="translate(222 0)"><rect width="80" height="22" rx="4" fill="#00F0FF"/><text x="40" y="15" text-anchor="middle" fill="#0A0A0A">info · 0</text></g>
    </g>

    <!-- Issue row -->
    <g transform="translate(24 164)" font-family="JetBrains Mono, monospace" font-size="13">
      <rect width="992" height="60" rx="12" fill="#FFFFFF" fill-opacity="0.04" stroke="#FF2D55" stroke-opacity="0.3"/>
      <text x="16" y="24" fill="#E5E5E5">grok-install.yaml:5</text>
      <text x="200" y="24" fill="#00F0FF" text-decoration="underline">grokinstall.platform-enum</text>
      <text x="16" y="46" fill="#FF2D55" font-size="12">runtime.platform must be one of 'x', 'grok-cli', 'grokagents.dev'. Got 'twitter'.</text>
    </g>

    <!-- Bullets -->
    <g transform="translate(24 252)" font-family="Inter, sans-serif" font-size="14" fill="#E5E5E5">
      <text y="0">• Fix the issues above, then re-run this check.</text>
      <text y="24" opacity="0.85">• See the rule catalog for remediation details.</text>
      <text y="48" opacity="0.85">• Learn about Grok-native certification at grokagents.dev.</text>
    </g>

    <!-- Footer -->
    <g transform="translate(24 368)" font-family="Inter, sans-serif" font-size="11">
      <text fill="#E5E5E5" opacity="0.6">Powered by grokagents.dev · VS Code extension · CLI</text>
      <text y="18" fill="#E5E5E5" opacity="0.45" font-style="italic">This certification is advisory. It does not guarantee runtime safety of third-party agent code.</text>
    </g>
  </g>

  <text x="600" y="658" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-style="italic" fill="#E5E5E5" opacity="0.5">This certification is advisory. It does not guarantee runtime safety of third-party agent code.</text>
</svg>
