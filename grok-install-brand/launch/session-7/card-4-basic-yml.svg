<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675">
  <rect width="1200" height="675" fill="#0A0A0A"/>
  <text x="80" y="110" font-family="Space Grotesk, Inter, sans-serif" font-weight="700" font-size="56" letter-spacing="2" fill="#FFFFFF">Drop-in CI gate.</text>
  <text x="80" y="150" font-family="Inter, sans-serif" font-size="20" fill="#E5E5E5" opacity="0.75">Paste this into .github/workflows/grokinstall.yml.</text>

  <g transform="translate(80 200)">
    <rect width="1040" height="320" rx="20" fill="#FFFFFF" fill-opacity="0.06" stroke="#00F0FF" stroke-opacity="0.15"/>
    <g font-family="JetBrains Mono, ui-monospace, monospace" font-size="18" fill="#E5E5E5">
      <text x="32" y="52"><tspan fill="#00F0FF">name:</tspan> Grok Install</text>
      <text x="32" y="84"><tspan fill="#00F0FF">on:</tspan> [push, pull_request]</text>
      <text x="32" y="116"><tspan fill="#00F0FF">jobs:</tspan></text>
      <text x="64" y="148"><tspan fill="#00F0FF">certify:</tspan></text>
      <text x="96" y="180"><tspan fill="#00F0FF">runs-on:</tspan> ubuntu-latest</text>
      <text x="96" y="212"><tspan fill="#00F0FF">steps:</tspan></text>
      <text x="128" y="244">- uses: actions/checkout@v4</text>
      <text x="128" y="276">- uses: <tspan fill="#00FF9D">AgentMindCloud/grok-install-action@v1</tspan></text>
    </g>
  </g>

  <g transform="translate(350 560)">
    <rect width="500" height="52" rx="16" fill="#00F0FF"/>
    <text x="250" y="34" text-anchor="middle" font-family="Inter, sans-serif" font-weight="700" font-size="18" fill="#0A0A0A">Install from GitHub Marketplace →</text>
  </g>

  <text x="600" y="658" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-style="italic" fill="#E5E5E5" opacity="0.5">This certification is advisory. It does not guarantee runtime safety of third-party agent code.</text>
</svg>
