<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  {% seo %}
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/github-markdown-css@5.5.1/github-markdown-dark.min.css">
  <style>
    :root { color-scheme: dark; }
    body {
      background: #0b0f17;
      color: #e6e8ef;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      margin: 0;
      padding: 2rem 1rem;
    }
    main {
      max-width: 860px;
      margin: 0 auto;
    }
    .markdown-body {
      background: #121826;
      color-scheme: dark;
      padding: 2.5rem;
      border-radius: 14px;
      box-sizing: border-box;
      box-shadow: 0 0 0 1px #1f2937, 0 20px 60px rgba(0,0,0,0.4);
    }
    .markdown-body img { max-width: 100%; }
    .site-header {
      max-width: 860px;
      margin: 0 auto 1.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.95rem;
      color: #8b93a7;
    }
    .site-header a { color: #7c5cff; text-decoration: none; }
    .site-header a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <header class="site-header">
    <a href="{{ '/' | relative_url }}">{{ site.title }}</a>
    <a href="https://github.com/AgentMindCloud/grok-install-action">View on GitHub →</a>
  </header>
  <main>
    <article class="markdown-body">
      {{ content }}
    </article>
  </main>
</body>
</html>
