# with-claude-code.yml — pair human-style code review (Claude) with
# machine-grade manifest certification (this action) on every PR.
name: Review + Certify

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  review-and-certify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Claude Code review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Review this PR focusing on the manifests at
            grok-install.yaml and capabilities.yaml. Flag anything
            that drifts from our Grok-native install conventions.

      - name: Grok-Native certify
        uses: AgentMindCloud/grok-install-action@v1
        with:
          mode: strict
          cli-version: "2.14.0"
          comment-on-pr: true
          update-badge: false        # PRs don't push to main, no badge commit needed
