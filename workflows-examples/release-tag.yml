# release-tag.yml — fail any release tag whose .grok/ doesn't pass GrokInstall
# in strict mode, then upload the generated badge as a release artifact.
name: GrokInstall (release-tag)

on:
  push:
    tags: ['v*']

permissions:
  contents: read
  checks: write

jobs:
  certify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - id: certify
        uses: AgentMindCloud/grok-install-action@v1
        with:
          mode: strict
          cli-version: "2.14.0"
          comment-on-pr: false       # tag pushes don't have a PR thread
          update-badge: true

      - name: Upload certification artifact
        if: steps.certify.outputs.passed == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: grok-certification-${{ github.ref_name }}
          path: ${{ steps.certify.outputs.badge-path }}
          if-no-files-found: error
